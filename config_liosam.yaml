# ============================================================================
# 深度估计项目 - LiOSAM odometry2 depth_dataset 配置
# ============================================================================
# 数据：index.txt + *.npz，每 npz 含事件张量 (2,260,346) 与深度图
# 序列：时间连续 sequence_length 帧为一组，相邻帧约 5ms，允许 ±3ms 偏差
# 加载：一半顺序(stream)、一半随机(random)，即 mixed 模式
# ============================================================================

# ----------------------------------------------------------------------------
# 数据集配置
# ----------------------------------------------------------------------------
dataset:
  name: liosam
  path: /home/zs/Research3/dataset/
  
  # 序列长度（可调）。12GB 显存建议 24；显存充足可改为 50 或 200
  sequence_length: 6
  
  # 时间连续性：正常间隔约 5ms，允许 3ms 以内偏差 → [2ms, 8ms]
  frame_interval_sec: 0.005
  max_interval_deviation_sec: 0.003
  
  # 多场景划分：指定哪些场景用于训练、哪些用于验证
  # path 下应包含以场景名命名的子目录（如 00/, 01/, ...），每个子目录含 index.txt + npz
  # train_scenes: ["00","01","02"]
  train_scenes: ["00","02","03","04","05","06","07","08","09"]
  val_scenes: ["01"]
  
  # 单场景回退：若不配置 train_scenes/val_scenes，则 path 下直接含 index.txt，
  # 按 train_ratio 比例划分 train/val
  # train_ratio: 0.8
  
  # npz 内 key：input=(2,260,346) 事件张量, label=(260,346) 深度真值（含 inf 处会生成 mask 排除）
  ev_key: input
  depth_key: label
  depth_mask_key: null  # 无单独 mask，从 label 的 isfinite 与范围生成
  
  resolution_hw: [260, 346]
  downsample_by_factor_2: False
  only_load_end_labels: False
  load_depth: true
  
  # 深度有效范围（米），用于 clamp 与 mask
  depth_range:
    min: 0.5
    max: 80.0
  
  # 训练：12GB 显存用 stream+bs1；显存充足可改为 mixed + 更大 batch
  train:
    sampling: 'random'  # 使用纯随机(Random Access)采样
    random:
      weighted_sampling: False
    mixed:
      w_stream: 1
      w_random: 1
  
  eval:
    sampling: 'random'

  # （可选）单 batch 调试：指定从第几个 npz 文件开始的序列
  # 只在你启用 --debug_fixed_batch 且在 train.py 中传入 debug_start_npz_idx 时真正生效
  debug_start_npz_index: None
  
  data_augmentation:
    random:
      prob_hflip: 0.5
      rotate:
        prob: 0.2
        min_angle_deg: 2
        max_angle_deg: 5
      zoom:
        prob: 0.8
        zoom_in:
          weight: 8
          factor:
            min: 1
            max: 1.3
        zoom_out:
          weight: 2
          factor:
            min: 1
            max: 1.15
    stream:
      prob_hflip: 0.5
      rotate:
        prob: 0.1
        min_angle_deg: 2
        max_angle_deg: 4
      zoom:
        prob: 0.5
        zoom_out:
          factor:
            min: 1
            max: 1.1

# ----------------------------------------------------------------------------
# 模型配置（输入 2 通道事件图 260x346，pad 到 260x348 以满足 H,W 被 4 整除）
# ----------------------------------------------------------------------------
model:
  name: depth

  backbone:
    name: MobileNetRNN
    compile:
      enable: False
      args:
        mode: reduce-overhead
    input_channels: 2   # 事件张量 2*260*346
    enable_masking: False
    embed_dim: 64
    dim_multiplier: [1, 2, 4, 8]
    num_blocks: [2, 2, 2, 2]
    T_max_chrono_init: [4, 8, 16, 32]
    in_res_hw: [260, 348]  # 346→348 满足 token mask padding 要求 (W%4==0)
    stem:
      patch_size: 4
    stage:
      lstm:
        cell_type: convlstm    # 'convlstm' or 'stlstm'
        zigzag: true          # ST-LSTM cross-layer M routing (requires cell_type: stlstm)
        dws_conv: False
        dws_conv_only_hidden: True
        dws_conv_kernel_size: 3
        drop_cell_update: 0
  
  fpn:
    name: PAFPN
    compile:
      enable: False
      args:
        mode: reduce-overhead
    depth: 0.67
    in_stages: [2, 3, 4]
    depthwise: False
    act: "silu"
  
  head:
    name: depth_head
    act: relu
  
  loss:
    berhu_weight: 1.0
    silog_weight: 1.0
    grad_weight: 0.5
    silog_lambda: 0.5
    scales: [2, 4, 8, 16]
  
  depth_range:
    min: 0.5
    max: 80.0

# ----------------------------------------------------------------------------
# 训练配置
# ----------------------------------------------------------------------------
training:
  precision: 32
  max_epochs: 10
  max_steps: 400000
  learning_rate: 0.0002
  weight_decay: 0.0001
  gradient_clip_val: 1.0
  limit_train_batches: 1.0
  
  lr_scheduler:
    use: True
    total_steps: 80600
    pct_start: 0.005
    div_factor: 25
    final_div_factor: 10000

# ----------------------------------------------------------------------------
# 验证配置
# ----------------------------------------------------------------------------
validation:
  limit_val_batches: 1.0
  val_check_interval: null
  check_val_every_n_epoch: 1

# ----------------------------------------------------------------------------
# Batch Size（12GB 显存：train=1 eval=1；显存充足可改为 2 或 4）
# ----------------------------------------------------------------------------
batch_size:
  train: 1
  eval: 1

# ----------------------------------------------------------------------------
# 硬件配置
# ----------------------------------------------------------------------------
hardware:
  num_workers:
    train: 0
    eval: 0
  gpus: 0
  dist_backend: "nccl"

# ----------------------------------------------------------------------------
# 日志和可视化
# ----------------------------------------------------------------------------
logging:
  ckpt_every_n_epochs: 1
  
  train:
    metrics:
      compute: false
      depth_metrics_every_n_steps: null
    log_model_every_n_steps: 5000
    log_every_n_steps: 500
    high_dim:
      enable: True
      every_n_steps: 5000
      n_samples: 4
  
  validation:
    high_dim:
      enable: True
      every_n_epochs: 1
      n_samples: 1

# ----------------------------------------------------------------------------
# WandB配置
# ----------------------------------------------------------------------------
wandb:
  wandb_runpath: null
  artifact_name: null
  artifact_local_file: null
  resume_only_weights: False
  group_name: liosam_depth
  project_name: EventDepth

# ----------------------------------------------------------------------------
# 可复现性设置
# ----------------------------------------------------------------------------
reproduce:
  seed_everything: null
  deterministic_flag: False
  benchmark: False
