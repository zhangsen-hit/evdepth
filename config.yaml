# ============================================================================
# 深度估计项目 - 完整配置文件 (Virtual数据集)
# ============================================================================

# ----------------------------------------------------------------------------
# 数据集配置
# ----------------------------------------------------------------------------
dataset:
  name: virtual
  path: data/virtual_depth  # 数据集路径（需要根据实际情况修改）
  ev_repr_name: 'stacked_histogram_dt=50_nbins=10'
  sequence_length: 3
  resolution_hw: [480, 640]
  downsample_by_factor_2: True
  only_load_end_labels: False
  load_depth: true
  
  # 训练数据采样
  train:
    sampling: 'random'  # 'random', 'stream', 'mixed'
    random:
      weighted_sampling: False
    mixed:
      w_stream: 1
      w_random: 1
  
  # 验证数据采样
  eval:
    sampling: 'random'
  
  # 数据增强
  data_augmentation:
    random:
      prob_hflip: 0.5
      rotate:
        prob: 0
        min_angle_deg: 2
        max_angle_deg: 6
      zoom:
        prob: 0.8
        zoom_in:
          weight: 8
          factor:
            min: 1
            max: 1.5
        zoom_out:
          weight: 2
          factor:
            min: 1
            max: 1.2
    stream:
      prob_hflip: 0.5
      rotate:
        prob: 0
        min_angle_deg: 2
        max_angle_deg: 6
      zoom:
        prob: 0.5
        zoom_out:
          factor:
            min: 1
            max: 1.2

# ----------------------------------------------------------------------------
# 模型配置
# ----------------------------------------------------------------------------
model:
  name: depth
  
  # Backbone: MobileNetV2 + RNN
  backbone:
    name: MobileNetRNN
    compile:
      enable: False
      args:
        mode: reduce-overhead
    input_channels: 20
    enable_masking: False
    embed_dim: 64
    dim_multiplier: [1, 2, 4, 8]  # Stage dims: 64, 128, 256, 512
    num_blocks: [1, 1, 1, 1]      # Number of MobileNetV2 blocks per stage
    T_max_chrono_init: [4, 8, 16, 32]
    in_res_hw: [480, 640]
    stem:
      patch_size: 4
    stage:
      lstm:
        cell_type: stlstm    # 'convlstm' or 'stlstm'
        zigzag: true          # ST-LSTM cross-layer M routing (requires cell_type: stlstm)
        dws_conv: False
        dws_conv_only_hidden: True
        dws_conv_kernel_size: 3
        drop_cell_update: 0
  
  # FPN (Feature Pyramid Network)
  fpn:
    name: PAFPN
    compile:
      enable: False
      args:
        mode: reduce-overhead
    depth: 0.67
    in_stages: [2, 3, 4]  # Use stages 2, 3, 4
    depthwise: False
    act: "silu"
  
  # 深度估计头
  head:
    name: depth_head
    act: relu
  
  # 损失函数
  loss:
    berhu_weight: 1.0
    silog_weight: 1.0
    grad_weight: 0.5
    silog_lambda: 0.5
    scales: [1, 2, 4, 8, 16]
    lap_weight: 0.3
    event_edge_sigma: 3.0
    event_edge_grad_ratio: 0.5
    scale1_weight_mul: 2.5
  
  # 深度范围
  depth_range:
    min: 0.1   # 最小深度 (米)
    max: 100.0 # 最大深度 (米)

# ----------------------------------------------------------------------------
# 训练配置
# ----------------------------------------------------------------------------
training:
  precision: 16  # 混合精度训练
  max_epochs: 10
  max_steps: 10000
  learning_rate: 0.0002
  weight_decay: 0
  gradient_clip_val: 1.0
  limit_train_batches: 1.0
  
  # 学习率调度器
  lr_scheduler:
    use: True
    total_steps: 10000
    pct_start: 0.005
    div_factor: 20
    final_div_factor: 10000

# ----------------------------------------------------------------------------
# 验证配置（与 liosam 一致：每个 epoch 结束时验证，确保 wandb 深度图/预测可视化正常）
# ----------------------------------------------------------------------------
validation:
  limit_val_batches: 1.0
  val_check_interval: null   # null=每 epoch 结束验证，与 liosam 一致
  check_val_every_n_epoch: 1 # 每 1 个 epoch 验证一次

# ----------------------------------------------------------------------------
# Batch Size
# ----------------------------------------------------------------------------
batch_size:
  train: 8
  eval: 8

# ----------------------------------------------------------------------------
# 硬件配置
# ----------------------------------------------------------------------------
hardware:
  num_workers:
    train: 4
    eval: 2
  gpus: 0  # 单GPU: 0, 多GPU: [0,1,2,3]
  dist_backend: "nccl"

# ----------------------------------------------------------------------------
# 日志和可视化（与 liosam 对齐，确保 wandb 上能看到深度图/预测可视化）
# ----------------------------------------------------------------------------
logging:
  ckpt_every_n_epochs: 1
  
  train:
    metrics:
      compute: false
      depth_metrics_every_n_steps: 500
    log_model_every_n_steps: 5000
    log_every_n_steps: 10
    high_dim:
      enable: True
      every_n_steps: 100    # 训练深度图 viz：每 100 步记录（virtual 每个 epoch 可能仅百余步，2000 会错过）
      n_samples: 4
  
  validation:
    high_dim:
      enable: True
      every_n_epochs: 1     # 验证深度图 viz：每个 epoch 记录
      n_samples: 4

# ----------------------------------------------------------------------------
# WandB配置
# ----------------------------------------------------------------------------
wandb:
  # 恢复训练设置
  wandb_runpath: null      # WandB run path (例如: USERNAME/PROJECTNAME/1grv5kg6)
  artifact_name: null      # Checkpoint名称 (例如: USERNAME/PROJECTNAME/checkpoint:v15)
  artifact_local_file: null  # 本地checkpoint文件路径
  resume_only_weights: False
  
  # 项目设置
  group_name: virtual_depth  # 实验组名称
  project_name: EventDepth   # WandB项目名称

# ----------------------------------------------------------------------------
# 可复现性设置
# ----------------------------------------------------------------------------
reproduce:
  seed_everything: null  # 设置为整数以固定随机种子
  deterministic_flag: False
  benchmark: False

