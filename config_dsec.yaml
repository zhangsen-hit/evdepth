# ============================================================================
# 深度估计项目 - DSEC数据集配置
# ============================================================================

# ----------------------------------------------------------------------------
# 数据集配置
# ----------------------------------------------------------------------------
dataset:
  name: dsec
  path: data/dsec_processed  # DSEC处理后的数据路径
  ev_repr_name: 'stacked_histogram_dt=50_nbins=10'
  sequence_length: 5
  resolution_hw: [480, 640]  # DSEC原始分辨率
  downsample_by_factor_2: True
  only_load_end_labels: False
  load_depth: true
  # 与 model.depth_range 一致，供 DepthLoader clamp/mask 使用
  depth_range:
    min: 0.5
    max: 80.0
  
  # 训练数据采样
  train:
    sampling: 'random'  # DSEC: stream采样更合适
    random:
      weighted_sampling: False
    mixed:
      w_stream: 2
      w_random: 1
  
  # 验证数据采样
  eval:
    sampling: 'random'
  
  # 数据增强
  data_augmentation:
    random:
      prob_hflip: 0.5
      rotate:
        prob: 0.2
        min_angle_deg: 2
        max_angle_deg: 5
      zoom:
        prob: 0.8
        zoom_in:
          weight: 8
          factor:
            min: 1
            max: 1.3
        zoom_out:
          weight: 2
          factor:
            min: 1
            max: 1.15
    stream:
      prob_hflip: 0.5
      rotate:
        prob: 0.1
        min_angle_deg: 2
        max_angle_deg: 4
      zoom:
        prob: 0.5
        zoom_out:
          factor:
            min: 1
            max: 1.1

# ----------------------------------------------------------------------------
# 模型配置
# ----------------------------------------------------------------------------
model:
  name: depth
  
  # Backbone: MobileNetV2 + RNN
  backbone:
    name: MobileNetRNN
    compile:
      enable: False
      args:
        mode: reduce-overhead
    input_channels: 20
    enable_masking: False
    embed_dim: 64
    dim_multiplier: [1, 2, 4, 8]
    num_blocks: [2, 2, 2, 2]  # DSEC: 更多blocks
    T_max_chrono_init: [4, 8, 16, 32]
    # 必须与数据实际分辨率一致：downsample_by_factor_2=True 时数据为 240x320，否则真值/预测尺寸错位（真值仅左上角1/4有值）
    in_res_hw: [240, 320]
    stem:
      patch_size: 4
    stage:
      lstm:
        cell_type: stlstm    # 'convlstm' or 'stlstm'
        zigzag: true          # ST-LSTM cross-layer M routing (requires cell_type: stlstm)
        dws_conv: False
        dws_conv_only_hidden: True
        dws_conv_kernel_size: 3
        drop_cell_update: 0
  
  # FPN
  fpn:
    name: PAFPN
    compile:
      enable: False
      args:
        mode: reduce-overhead
    depth: 0.67
    in_stages: [2, 3, 4]
    depthwise: False
    act: "silu"
  
  # 深度估计头
  head:
    name: depth_head
    act: relu
  
  # 损失函数
  loss:
    berhu_weight: 1.0
    silog_weight: 1.0
    grad_weight: 0.5
    silog_lambda: 0.5
    scales: [1, 2, 4, 8, 16]
    lap_weight: 0.3
    event_edge_sigma: 3.0
    event_edge_grad_ratio: 0.5
    scale1_weight_mul: 2.5
  
  # 深度范围 (根据DSEC调整)
  depth_range:
    min: 0.5    # DSEC驾驶场景最小深度
    max: 80.0   # DSEC驾驶场景最大深度

# ----------------------------------------------------------------------------
# 训练配置
# ----------------------------------------------------------------------------
training:
  precision: 16
  max_epochs: 10000
  max_steps: 400000  # DSEC: 更长训练
  learning_rate: 0.0002
  weight_decay: 0
  gradient_clip_val: 1.0
  limit_train_batches: 1.0
  
  # 学习率调度器
  lr_scheduler:
    use: True
    total_steps: 400000
    pct_start: 0.005
    div_factor: 25
    final_div_factor: 10000

# ----------------------------------------------------------------------------
# 验证配置
# ----------------------------------------------------------------------------
validation:
  limit_val_batches: 1.0
  val_check_interval: null
  check_val_every_n_epoch: 1

# ----------------------------------------------------------------------------
# Batch Size
# ----------------------------------------------------------------------------
batch_size:
  train: 4  # DSEC数据较大，减小batch size
  eval: 4

# ----------------------------------------------------------------------------
# 硬件配置
# ----------------------------------------------------------------------------
hardware:
  num_workers:
    train: 0  # Windows下建议设为0
    eval: 0
  gpus: 0  # 根据实际情况调整，CPU训练设为-1
  dist_backend: "nccl"

# ----------------------------------------------------------------------------
# 日志和可视化
# ----------------------------------------------------------------------------
logging:
  ckpt_every_n_epochs: 1
  
  train:
    metrics:
      compute: false
      depth_metrics_every_n_steps: null
    log_model_every_n_steps: 5000
    log_every_n_steps: 500
    high_dim:
      enable: True
      every_n_steps: 5000
      n_samples: 4
  
  validation:
    high_dim:
      enable: True
      every_n_epochs: 1
      n_samples: 8

# ----------------------------------------------------------------------------
# WandB配置
# ----------------------------------------------------------------------------
wandb:
  wandb_runpath: null
  artifact_name: null
  artifact_local_file: null
  resume_only_weights: False
  group_name: dsec_depth
  project_name: EventDepth

# ----------------------------------------------------------------------------
# 可复现性设置
# ----------------------------------------------------------------------------
reproduce:
  seed_everything: null
  deterministic_flag: False
  benchmark: False

